services:
  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-multi-user-nightscout}-nginx
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./generated/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - proxy-net

  mongo:
    image: ${MONGO_IMAGE:-mongo:6}
    container_name: ${MONGO_CONTAINER_NAME:-shared-mongo}
    restart: unless-stopped
    command: ["mongod", "--auth", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?set MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD}
    volumes:
      - ./data/mongo:/data/db
    networks:
      - mongo-net

networks:
  proxy-net:
    name: ${COMPOSE_PROJECT_NAME:-multi-user-nightscout}-proxy-net
  mongo-net:
    name: ${COMPOSE_PROJECT_NAME:-multi-user-nightscout}-mongo-net
